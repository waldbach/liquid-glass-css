<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="hint">Drag the glass disc to see the effect</div>

    <div class="draggable">
        <div class="inner outline"></div>
        <div class="inner inner--05"></div>
        <div class="inner inner--04"></div>
        <div class="inner inner--03"></div>
        <div class="inner inner--02"></div>
        <div class="inner inner--01"></div>
        <div class="inner inner-00"></div>
        <div class="inner inner-01"></div>
        <div class="inner inner-02"></div>
        <div class="inner inner-03"></div>
        <div class="inner inner-04"></div>
        <div class="inner inner-05"></div>
        <div class="inner inner-06"></div>
        <div class="inner inner-07"></div>
        <div class="inner inner-08"></div>
        <div class="inner inner-09"></div>
    </div>

    <div class="bg-switcher">
        <button class="bg-option is-active" data-bg="img/threads.webp" aria-label="Threads background"></button>
        <button class="bg-option" data-bg="img/vases.webp" aria-label="Vases background"></button>
    </div>


    <script src="script.js"></script>
</body>
</html>
